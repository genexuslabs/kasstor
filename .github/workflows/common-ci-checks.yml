name: Common CI Checks

on:
  workflow_call:
    inputs:
      cache:
        description: "Use cache node modules"
        required: false
        type: boolean
      package:
        description: "Package"
        required: true
        type: string
      publish:
        description: "Publish"
        required: true
        type: boolean

jobs:
  install-build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Pinning to a specific commit hash for security reasons.
      # This hash corresponds to version 4.3.0 of the actions/checkout action.
      # To update, find the desired commit hash from the releases page:
      # https://github.com/actions/checkout/releases
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      # Pinning to a specific commit hash for security reasons.
      # This hash corresponds to version 4.0.0 of the actions/setup-node action.
      # To update, find the desired commit hash from the releases page:
      # https://github.com/actions/setup-node/releases
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org/

      # Using a pinned commit hash for security reasons, as recommended by GitHub Advanced Security.
      # This hash corresponds to version 2.0.2 of the oven-sh/setup-bun action.
      # To update, find the desired commit hash from the releases page:
      # https://github.com/oven-sh/setup-bun/releases
      - name: Install Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76

      # Pinning to a specific commit hash for security reasons.
      # This hash corresponds to version 3.4.3 of the actions/cache action.
      # To update, find the desired commit hash from the releases page:
      # https://github.com/actions/cache/releases
      - name: Cache node_modules
        if: ${{ inputs.cache == true }}
        uses: actions/cache@2f8e54208210a422b2efd51efaa6bd6d7ca8920f
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun i --linker hoisted
        working-directory: ${{ inputs.package }}

      # Pre-build order follows the workspace's INTERNAL dependency graph so
      # that whichever package the CI job is testing can resolve every
      # `@genexus/*` import through built `dist/` artifacts (workspace
      # packages are symlinked, but only their published `files` — i.e.
      # `dist/` — are actually resolvable).
      #
      # Tier 0 (no internal deps):
      #   - kasstor-webkit
      #   - kasstor-design-system
      #   - kasstor-build
      #
      # Tier 1 (depends on Tier 0):
      #   - vite-plugin-kasstor    (imports from kasstor-build)
      #
      # Tier 2 (depends on Tier 0 + 1):
      #   - kasstor-core           (imports from kasstor-webkit + kasstor-
      #                             design-system at runtime, AND from
      #                             vite-plugin-kasstor in its vite.config.ts
      #                             — the latter is what makes the
      #                             vite-plugin-kasstor pre-build necessary
      #                             here, the bug that took the CI green
      #                             before this PR's `kasstor()` plugin was
      #                             wired into `packages/core/vite.config.ts`)
      #
      # Tier 3 (depends on Tier 2):
      #   - kasstor-insights       (imports from kasstor-core)
      #
      # TODO: each step is gated on the actual job in flight — we should
      # skip pre-builds whose output is not transitively needed by the
      # `${{ inputs.package }}` being tested.
      - name: Pre-build webkit
        run: bun dev
        working-directory: "packages/webkit"

      - name: Pre-build design-system
        run: bun dev
        working-directory: "packages/design-system"

      - name: Pre-build build
        run: bun dev
        working-directory: "packages/build"

      - name: Pre-build vite-plugin-kasstor
        run: bun dev
        working-directory: "packages/plugins/vite-plugin-kasstor"

      - name: Pre-build core
        run: bun dev
        working-directory: "packages/core"

      - name: Pre-build insights
        run: bun dev
        working-directory: "packages/insights"

      # This is a faster check than trying to build the whole package
      - name: Build types
        run: bun dev.types
        working-directory: ${{ inputs.package }}

      - name: Build package
        run: bun run build
        working-directory: ${{ inputs.package }}

      - name: Run tests
        run: bun test.ci
        working-directory: ${{ inputs.package }}

      - name: Publish
        if: ${{ inputs.publish == true }}
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
        working-directory: ${{ inputs.package }}

